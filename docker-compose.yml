services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY=${NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY}
    expose:
      - '3000'
    env_file:
      - .env
    restart: unless-stopped

  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - /etc/letsencrypt/live/careerbridge-david.duckdns.org/fullchain.pem:/etc/nginx/certs/server.crt:ro
      - /etc/letsencrypt/live/careerbridge-david.duckdns.org/privkey.pem:/etc/nginx/certs/server.key:ro
    depends_on:
      - app
    restart: unless-stopped
