name: CI/CD Pipeline

on:
  push:
    branches: [main]

jobs:
  # ─────────────────────────────────────────────
  # CI: verify the build compiles cleanly
  # ─────────────────────────────────────────────
  build:
    name: Build Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        # SKIP_ENV_VALIDATION bypasses t3-oss/env-nextjs runtime checks.
        # SDK constructors (Resend, UTApi, drizzle) use ?? fallbacks in their
        # client files so they never throw when env vars are undefined in CI.
        # NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY must be real: Clerk validates it
        # at prerender time and it is a public key safe to store as a secret.
        run: npm run build
        env:
          SKIP_ENV_VALIDATION: true
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
          NEXT_PUBLIC_CLERK_SIGN_IN_URL: /sign-in
          NEXT_PUBLIC_CLERK_SIGN_IN_FALLBACK_REDIRECT_URL: /
          NEXT_PUBLIC_CLERK_SIGN_UP_FALLBACK_REDIRECT_URL: /

  # ─────────────────────────────────────────────
  # CD: deploy to DigitalOcean Droplet via SSH
  # ─────────────────────────────────────────────
  deploy:
    name: Deploy to Droplet
    runs-on: ubuntu-latest
    needs: build # only runs if the build job succeeds

    steps:
      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p ${{ secrets.SSH_PORT }} -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy to Droplet
        run: |
          ssh -i ~/.ssh/deploy_key \
            -p ${{ secrets.SSH_PORT }} \
            -o StrictHostKeyChecking=no \
            ${{ secrets.SSH_USERNAME }}@${{ secrets.SSH_HOST }} \
            "set -e && cd ~/CareerBridge && git pull origin main && docker compose up -d --build"
