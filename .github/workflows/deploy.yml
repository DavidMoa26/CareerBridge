name: CI/CD Pipeline

on:
  push:
    branches: [main]

jobs:
  # ─────────────────────────────────────────────
  # CI: verify the build compiles cleanly
  # ─────────────────────────────────────────────
  build:
    name: Build Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        # SKIP_ENV_VALIDATION bypasses t3-oss/env-nextjs runtime checks so the
        # build can verify TypeScript/JSX correctness without real secrets.
        # The actual runtime validation still runs inside Docker on the server.
        run: npm run build
        env:
          SKIP_ENV_VALIDATION: true

  # ─────────────────────────────────────────────
  # CD: deploy to DigitalOcean Droplet via SSH
  # ─────────────────────────────────────────────
  deploy:
    name: Deploy to Droplet
    runs-on: ubuntu-latest
    needs: build # only runs if the build job succeeds

    steps:
      - name: SSH into Droplet and deploy
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            set -e
            cd ~/CareerBridge
            git pull origin main
            docker compose up -d --build
