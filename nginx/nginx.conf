events {
    worker_connections 1024;
}

http {
    server {
        listen 80;
        server_name careerbridge-david.duckdns.org;
        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl;
        server_name careerbridge-david.duckdns.org;

        ssl_certificate     /etc/letsencrypt/live/careerbridge-david.duckdns.org/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/careerbridge-david.duckdns.org/privkey.pem;

        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;

        location /clerk/ {
            proxy_pass            https://api.clerk.com/;
            proxy_ssl_server_name on;
            proxy_http_version    1.1;

            proxy_set_header      Host              api.clerk.com;
            proxy_set_header      X-Real-IP         $remote_addr;
            proxy_set_header      X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header      X-Forwarded-Proto $scheme;
        }

        location / {
            proxy_pass         http://app:3000;
            proxy_http_version 1.1;

            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   Upgrade           $http_upgrade;
            proxy_set_header   Connection        "upgrade";
        }
    }
}
